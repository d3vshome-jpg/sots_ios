name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Fix gradlew permissions
      run: chmod +x gradlew
    
    - name: Build iOS App for Simulator
      run: |
        cd iosApp
        xcodebuild -scheme iosApp -configuration Release -destination 'platform=iOS Simulator,name=iPhone 16' -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO SKIP_KOTLIN_FRAMEWORK=1
    
    - name: Upload .app
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: iosApp/build/Build/Products/Release-iphonesimulator/*.app
        retention-days: 30
